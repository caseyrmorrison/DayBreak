<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daybreak recovery</title>
</head>
<body style="font-family: system-ui, sans-serif; padding: 3rem 1.5rem; max-width: 32rem; margin: 0 auto;">
  <h1 style="font-size: 1.25rem; font-weight: 500;">Daybreak recovery</h1>
  <p id="status">Clearing cached app files…</p>
  <p style="color: #666; font-size: .875rem;">
    This unregisters the offline service worker and clears cached files,
    then reloads the app fresh from the server. Your tasks, streak, and
    sync settings are not touched.
  </p>
  <script src="/reset.js"></script>
</body>
</html>
